name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_native:
    strategy:
      matrix:
        include:
          - os: windows-latest
            backend: opengl
            define: SOKOL_GLCORE
            link_libs: "opengl32.lib user32.lib gdi32.lib"
            artifact_name: triangle_win_opengl.exe
          - os: windows-latest
            backend: d3d11
            define: SOKOL_D3D11
            link_libs: "d3d11.lib dxgi.lib user32.lib gdi32.lib"
            artifact_name: triangle_win_d3d11.exe
          - os: ubuntu-latest
            backend: opengl
            define: SOKOL_GLCORE
            link_libs: "-lGL -lX11 -lm -lpthread -ldl"
            artifact_name: triangle_linux_opengl
          - os: macos-latest
            backend: opengl
            define: SOKOL_GLCORE
            link_libs: "-framework OpenGL -framework Cocoa -framework QuartzCore"
            artifact_name: triangle_macos_opengl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libgl1-mesa-dev

      - name: Remove hardcoded backend defines
        run: |
          sed -i '/^#define SOKOL_GLCORE/d' main.c
          sed -i '/^#define SOKOL_D3D11/d' main.c
        shell: bash

      - name: Build on Windows (MSVC)
        if: runner.os == 'Windows'
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64 || call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          cl /I. /D${{ matrix.define }} main.c /Fe${{ matrix.artifact_name }} /link ${{ matrix.link_libs }}
        shell: cmd

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          gcc -o ${{ matrix.artifact_name }} main.c -I. -D${{ matrix.define }} ${{ matrix.link_libs }}

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: |
          clang -o ${{ matrix.artifact_name }} main.c -I. -D${{ matrix.define }} ${{ matrix.link_libs }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v3
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Configure CMake for Emscripten
        run: |
          emcmake cmake -B build_web -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly
        run: cmake --build build_web --target sokol_triangle

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp build_web/sokol_triangle.* deploy/
          # 如果存在自定义 shell.html，则复制
          [ -f shell.html ] && cp shell.html deploy/
          # 重命名 index.html
          [ -f deploy/sokol_triangle.html ] && mv deploy/sokol_triangle.html deploy/index.html

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: deploy/

  deploy_pages:
    needs: [build_native, build_web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web_build
          path: public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4