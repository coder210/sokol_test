jobs:
  native-build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            build_dir: build-linux
            deps: "libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev"  # 添加依赖
          - os: windows-latest
            build_dir: build-windows
          - os: macos-latest
            build_dir: build-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux 特有：安装 OpenGL 和 X11 开发库
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Configure CMake
        run: cmake -B ${{ matrix.build_dir }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --config Release --parallel

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: triangle-${{ matrix.os }}
          path: ${{ matrix.build_dir }}/triangle*   # Linux/macOS 生成 triangle，Windows 生成 triangle.exe
          if-no-files-found: ignore