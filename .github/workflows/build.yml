name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ========== 原生构建 ==========
  build_native:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: triangle_win.exe
          - os: ubuntu-latest
            artifact_name: triangle_linux
          - os: macos-latest
            artifact_name: triangle_macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux 安装依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libgl1-mesa-dev

      # 配置 CMake
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # 构建
      - name: Build
        run: cmake --build build --config Release

      # 上传原生程序
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/Release/triangle.exe

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/triangle

  # ========== WebAssembly 构建 ==========
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v3
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Configure CMake for Emscripten
        run: emcmake cmake -B build_web -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly
        run: cmake --build build_web --target triangle

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp build_web/triangle.* deploy/
          # 若有自定义 shell.html 则一并复制
          [ -f shell.html ] && cp shell.html deploy/
          # 将生成的 html 重命名为 index.html（供 GitHub Pages 直接访问）
          if [ -f deploy/triangle.html ]; then
            mv deploy/triangle.html deploy/index.html
          fi

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: deploy/

  # ========== 部署到 GitHub Pages ==========
  deploy_pages:
    needs: [build_native, build_web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web_build
          path: public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4